services:
  - type: web
    name: worddeck
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # 部署時在 Render 填(圖片/PDF 的 AI 辨識才需要)
      - key: DEV_ALLOW_NO_AUTH
        value: "1"           # 前端是本機模式(無登入),後端跳過驗證
      - key: MAX_UPLOAD_MB
        value: "50"          # 每檔安全上限(防當機),大圖會自動縮小
      - key: MAX_PDF_PAGES
        value: "300"         # 高安全上限;PDF 靠分頁分批處理,不再 20 頁就擋
      - key: PDF_BATCH_PAGES
        value: "8"
